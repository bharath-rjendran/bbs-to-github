name: bbs-to-gh-migration
true:
  workflow_dispatch:
    inputs:
      csv_path:
        description: Path to repos CSV file
        required: true
        default: repos.csv
        type: string
      bbs_base_url:
        description: Bitbucket Server base URL (e.g., https://bitbucket.example.com)
        required: true
        type: string
      max_concurrent:
        description: Maximum concurrent migrations (1-5)
        required: false
        default: '5'
        type: choice
        options:
        - '1'
        - '2'
        - '3'
        - '4'
        - '5'
      approver:
        description: migrator/approver github handler
        required: true
        default: e.g. naik123
        type: string
permissions:
  contents: read
  actions: write
  issues: write
jobs:
  readiness-check:
    name: PR Readiness Check (PR-only)
    runs-on: windows-latest
    timeout-minutes: 30
    environment: PAT tokens
    outputs:
      check-passed: ${{ steps.check-result.outputs.passed }}
      has-warnings: ${{ steps.check-result.outputs.has-warnings }}
      open-pr-count: ${{ steps.check-result.outputs.open-pr-count }}
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
    - name: Validate inputs & secrets
      shell: pwsh
      env:
        BBS_BASE_URL: ${{ inputs.bbs_base_url }}
        BBS_PAT: ${{ secrets.BBS_PAT }}
        BBS_USERNAME: ${{ secrets.BBS_USERNAME }}
        BBS_PASSWORD: ${{ secrets.BBS_PASSWORD }}
      run: |
        $missing = @()
        if (-not $env:BBS_BASE_URL) { $missing += 'BBS_BASE_URL (workflow input)' }
        if (-not $env:BBS_PAT -and (-not $env:BBS_USERNAME -or -not $env:BBS_PASSWORD)) {
          $missing += 'BBS_PAT or BBS_USERNAME + BBS_PASSWORD (secrets)'
        }
        if ($missing.Count -gt 0) {
          Write-Host "::error::Missing required values: $($missing -join ', ')"
          exit 1
        }
    - name: Run PR Readiness (PR-only)
      id: run-check
      shell: pwsh
      env:
        BBS_PAT: ${{ secrets.BBS_PAT }}
        BBS_USERNAME: ${{ secrets.BBS_USERNAME }}
        BBS_PASSWORD: ${{ secrets.BBS_PASSWORD }}
        BBS_BASE_URL: ${{ inputs.bbs_base_url }}
      run: "Write-Host \"===== PR Readiness Check (PR-only) =====\" -ForegroundColor Cyan\n& .\\scripts\\0_pr_pipeline_check.ps1 -CsvPath \"${{\
        \ inputs.csv_path }}\"\n$outCsv = Get-ChildItem -Filter \"bbs_pipeline_validation_output-*.csv\" | Sort-Object LastWriteTime -Descending\
        \ | Select-Object -First 1\nif (-not $outCsv) {\n  Write-Host \"::warning::No output CSV produced by the check script.\"\n  echo \"PR_ONLY_PASSED=true\"\
        \ >> $env:GITHUB_ENV\n  echo \"HAS_WARNINGS=true\" >> $env:GITHUB_ENV\n  echo \"OPEN_PR_COUNT=0\" >> $env:GITHUB_ENV\n  exit 0\n}\n\n\
        $data = Import-Csv $outCsv.FullName\n\n# PR-only: treat any repo with open_pr_count > 0 as a WARNING (not a blocker)\n$openPrRepos = $data\
        \ | Where-Object { [int]($_.open_pr_count) -gt 0 }\n$openPrCount = ($openPrRepos | Measure-Object).Count\n\nif ($openPrCount -gt 0) {\n\
        \  Write-Host (\"`n\u26A0\uFE0F WARNING: {0} repo(s) have open PRs\" -f $openPrCount) -ForegroundColor Yellow\n  echo \"PR_ONLY_PASSED=true\"\
        \ >> $env:GITHUB_ENV\n  echo \"HAS_WARNINGS=true\" >> $env:GITHUB_ENV\n  echo (\"OPEN_PR_COUNT={0}\" -f $openPrCount) >> $env:GITHUB_ENV\n\
        } else {\n  Write-Host \"`n\u2705 No open PRs detected\" -ForegroundColor Green\n  echo \"PR_ONLY_PASSED=true\" >> $env:GITHUB_ENV\n \
        \ echo \"HAS_WARNINGS=false\" >> $env:GITHUB_ENV\n  echo \"OPEN_PR_COUNT=0\" >> $env:GITHUB_ENV\n}\nWrite-Host (\"Output CSV: {0}\" -f\
        \ $outCsv.FullName)\n"
    - name: Set Readiness Outputs (PR-only)
      id: check-result
      shell: pwsh
      run: |
        echo "passed=$env:PR_ONLY_PASSED"        >> $env:GITHUB_OUTPUT
        echo "has-warnings=$env:HAS_WARNINGS"    >> $env:GITHUB_OUTPUT
        echo "open-pr-count=$env:OPEN_PR_COUNT"  >> $env:GITHUB_OUTPUT
        if ($env:HAS_WARNINGS -eq 'true') {
          Write-Host "::warning::Open PR(s) found. This is a WARNING, not a blocker."
        } else {
          Write-Host "::notice::PR-only check clean."
        }
    - name: Upload PR check outputs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: bbs-pr-check-${{ github.run_number }}
        path: bbs_pipeline_validation_output-*.csv
        retention-days: 30
        if-no-files-found: warn
    - name: Generate PR Check Summary
      if: always()
      shell: pwsh
      run: "$open = $env:OPEN_PR_COUNT\n$csvPath = \"${{ inputs.csv_path }}\"\n$bbsUrl  = \"${{ inputs.bbs_base_url }}\"\n$outCsv  = Get-ChildItem\
        \ -Filter \"bbs_pipeline_validation_output-*.csv\" | Sort-Object LastWriteTime -Descending | Select-Object -First 1\n\nAdd-Content $env:GITHUB_STEP_SUMMARY\
        \ '# \U0001F50E PR Readiness Summary (PR-only)'\nAdd-Content $env:GITHUB_STEP_SUMMARY ''\nif ($env:HAS_WARNINGS -eq 'true') {\n  Add-Content\
        \ $env:GITHUB_STEP_SUMMARY \"## Overall Status: \U0001F7E1 Warning(s) detected\"\n  Add-Content $env:GITHUB_STEP_SUMMARY (\"- **Repos\
        \ with open PRs**: \" + $open)\n} else {\n  Add-Content $env:GITHUB_STEP_SUMMARY \"## Overall Status: \U0001F7E2 No warnings\"\n  Add-Content\
        \ $env:GITHUB_STEP_SUMMARY \"- **Repos with open PRs**: 0\"\n}\nAdd-Content $env:GITHUB_STEP_SUMMARY \"\"\nAdd-Content $env:GITHUB_STEP_SUMMARY\
        \ (\"**CSV**: ``\" + $csvPath + \"``\")\nAdd-Content $env:GITHUB_STEP_SUMMARY (\"**Bitbucket Base URL**: \" + $bbsUrl)\n\nif ($outCsv)\
        \ {\n  $data = Import-Csv $outCsv.FullName | Where-Object { [int]($_.open_pr_count) -gt 0 }\n  if ($data) {\n    Add-Content $env:GITHUB_STEP_SUMMARY\
        \ \"\"\n    Add-Content $env:GITHUB_STEP_SUMMARY \"### \U0001F4CC Repositories with Open PRs\"\n    Add-Content $env:GITHUB_STEP_SUMMARY\
        \ \"\"\n    Add-Content $env:GITHUB_STEP_SUMMARY \"Project Key | Repo | Open PR Count | Default Branch | Latest Commit\"\n    Add-Content\
        \ $env:GITHUB_STEP_SUMMARY \"---|---|---:|---|---\"\n    foreach ($r in $data) {\n      $defb = if ($r.default_branch) { \"`{$($r.default_branch)`}\"\
        \ } else { \"_n/a_\" }\n      $hash = if ($r.latest_commit_id) { (\"`{0`}\" -f $r.latest_commit_id.Substring(0,[Math]::Min(12,$r.latest_commit_id.Length)))\
        \ } else { \"_n/a_\" }\n      Add-Content $env:GITHUB_STEP_SUMMARY (\"`{0`}|`{1`}|{2}|{3}|{4}\" -f $r.project_key, $r.repo_slug, $r.open_pr_count,\
        \ $defb, $hash)\n    }\n  }\n}\n"
  approval-gate:
    name: "\u2705 Manual Approval to Proceed"
    runs-on: ubuntu-latest
    needs:
    - readiness-check
    steps:
    - name: Context
      run: |
        echo "Approval is required to proceed to migration."
        echo "Open PRs detected: ${{ needs.readiness-check.outputs.open-pr-count }}"
        echo "Warnings present:   ${{ needs.readiness-check.outputs.has-warnings }}"
    - name: Wait for manual approval
      uses: trstringer/manual-approval@v1
      with:
        secret: ${{ github.token }}
        approvers: ${{ inputs.approver }}
        minimum-approvals: 1
        issue-title: Approve migration to GitHub
        issue-body: |
          Please review PR readiness summary in the job above.
          Comment **approved** to proceed, or **deny** to stop.
        exclude-workflow-initiator-as-approver: false
        fail-on-denial: true
        polling-interval-seconds: 30
  migrate-repositories:
    name: "Migrate Repositories (BBS \u279C GH)"
    runs-on: windows-latest
    timeout-minutes: 360
    environment: PAT tokens
    needs:
    - approval-gate
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
    - name: Setup GitHub CLI
      shell: pwsh
      env:
        GH_TOKEN: ${{ secrets.GH_PAT }}
      run: |
        Write-Host "GitHub CLI Version:" -ForegroundColor Cyan
        gh --version
        Write-Host "`nAuthentication Status:" -ForegroundColor Cyan
        gh auth status
    - name: Install BBS2GH Extension
      shell: pwsh
      env:
        GH_TOKEN: ${{ secrets.GH_PAT }}
      run: |
        Write-Host "Installing gh-bbs2gh extension..." -ForegroundColor Cyan
        gh extension install github/gh-bbs2gh
        Write-Host "`nVerifying installation:" -ForegroundColor Cyan
        gh bbs2gh --version
    - name: Validate CSV File
      shell: pwsh
      run: |
        $csvPath = ${{ inputs.csv_path }}

        if (-not (Test-Path $csvPath)) {
          throw "CSV file not found: $csvPath"
        }

        $repos = Import-Csv -Path $csvPath
        if (-not $repos -or $repos.Count -eq 0) {
          throw "CSV is empty: $csvPath"
        }

        $requiredColumns = @('project-key','project-name','repo','github_org','github_repo','gh_repo_visibility')
        $missingColumns = $requiredColumns | Where-Object { $_ -notin $repos[0].PSObject.Properties.Name }
        if ($missingColumns) {
          throw "Missing required columns: $($missingColumns -join ', ')"
        }

        $badVis = $repos | Where-Object { $_.'gh_repo_visibility' -notmatch '^(public|private|internal)$' }
        if ($badVis) {
          throw "Invalid gh_repo_visibility values found. Use: public|private|internal"
        }

        Write-Host "[SUCCESS] CSV validation passed" -ForegroundColor Green
    - name: Run Concurrent Migration
      shell: pwsh
      env:
        GH_PAT: ${{ secrets.GH_PAT }}
        GH_TOKEN: ${{ secrets.GH_PAT }}
        BBS_USERNAME: ${{ secrets.BBS_USERNAME }}
        BBS_PASSWORD: ${{ secrets.BBS_PASSWORD }}
        BBS_BASE_URL: ${{ inputs.bbs_base_url }}
        SSH_USER: ${{ secrets.SSH_USER }}
        SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      run: |
        .\scripts\1_migration.ps1 `
          -MaxConcurrent ${{ inputs.max_concurrent }} `
          -CsvPath ${{ inputs.csv_path }}
    - name: Generate Migration Summary (Detailed)
      if: always()
      shell: pwsh
      run: "$ErrorActionPreference = 'Continue'\n\n# Find latest migration output CSV\n$outputCsv = Get-ChildItem -Filter 'repo_migration_output-*.csv'\
        \ |\n             Sort-Object LastWriteTime -Descending |\n             Select-Object -First 1\n\n# Header\nAdd-Content $env:GITHUB_STEP_SUMMARY\
        \ '# \U0001F680 Migration Execution Summary (Bitbucket Server \u2192 GitHub)'\nAdd-Content $env:GITHUB_STEP_SUMMARY ''\n\nif (-not $outputCsv)\
        \ {\n  Add-Content $env:GITHUB_STEP_SUMMARY '\u26A0\uFE0F **No output CSV found** (`repo_migration_output-*.csv`).'\n  Add-Content $env:GITHUB_STEP_SUMMARY\
        \ ''\n  Add-Content $env:GITHUB_STEP_SUMMARY '## \U0001F4C1 Artifacts'\n  Add-Content $env:GITHUB_STEP_SUMMARY ('- Migration logs artifact:\
        \ `migration-logs-{0}`' -f ${{ github.run_id }})\n  Add-Content $env:GITHUB_STEP_SUMMARY '- Verbose logs artifact: `verbose-logs`'\n\
        \  Add-Content $env:GITHUB_STEP_SUMMARY ('- Output CSV artifact: `migration-output-csv-{0}`' -f ${{ github.run_id }})\n  exit 0\n}\n\
        \n$results = Import-Csv -Path $outputCsv.FullName\n\n$total   = $results.Count\n$success = ($results | Where-Object { $_.Migration_Status\
        \ -eq 'Success' }).Count\n$failed  = ($results | Where-Object { $_.Migration_Status -eq 'Failure' }).Count\n$pending = ($results | Where-Object\
        \ { $_.Migration_Status -eq 'Pending' }).Count\n$successRate = if ($total -gt 0) { [math]::Round(($success / $total) * 100, 2) } else\
        \ { 0 }\n\n# Overall stats\nAdd-Content $env:GITHUB_STEP_SUMMARY '## \U0001F4CA Overall Statistics'\nAdd-Content $env:GITHUB_STEP_SUMMARY\
        \ ('- **Total Repositories**: {0}' -f $total)\nAdd-Content $env:GITHUB_STEP_SUMMARY ('- **Successfully Migrated**: \u2705 {0}' -f $success)\n\
        Add-Content $env:GITHUB_STEP_SUMMARY ('- **Failed Migrations**: \u274C {0}' -f $failed)\nAdd-Content $env:GITHUB_STEP_SUMMARY ('- **Pending/Not\
        \ Started**: \u23F3 {0}' -f $pending)\nAdd-Content $env:GITHUB_STEP_SUMMARY ('- **Success Rate**: {0}%' -f $successRate)\nAdd-Content\
        \ $env:GITHUB_STEP_SUMMARY ('- **Concurrent Jobs**: {0}' -f ${{ inputs.max_concurrent }})\nAdd-Content $env:GITHUB_STEP_SUMMARY ''\n\
        \n# Artifacts\nAdd-Content $env:GITHUB_STEP_SUMMARY '## \U0001F4C1 Artifacts'\nAdd-Content $env:GITHUB_STEP_SUMMARY ('- Output CSV: `{0}`\
        \ (uploaded as `migration-output-csv-{1}`)' -f $outputCsv.Name, ${{ github.run_id }})\nAdd-Content $env:GITHUB_STEP_SUMMARY ('- Migration\
        \ logs: `migration-logs-{0}` (pattern: `migration-*.txt`)' -f ${{ github.run_id }})\nAdd-Content $env:GITHUB_STEP_SUMMARY '- Verbose\
        \ logs: `verbose-logs` (patterns: `*.log`, `**/*.log`, `logs/**/*.log`)'\nAdd-Content $env:GITHUB_STEP_SUMMARY ''\n\n# Failed table\n\
        if ($failed -gt 0) {\n  Add-Content $env:GITHUB_STEP_SUMMARY '## \u274C Failed Migrations'\n  Add-Content $env:GITHUB_STEP_SUMMARY ''\n\
        \  Add-Content $env:GITHUB_STEP_SUMMARY '| Repository | BBS Project | GitHub Org | Log File |'\n  Add-Content $env:GITHUB_STEP_SUMMARY\
        \ '|------------|-------------|------------|----------|'\n\n  ($results | Where-Object { $_.Migration_Status -eq 'Failure' }) | ForEach-Object\
        \ {\n    $repoName = if ($_.repo) { $_.repo } else { $_.github_repo }\n    $bbsProj  = $_.'project-key'\n    $ghOrg    = $_.github_org\n\
        \    $logFile  = $_.Log_File\n    Add-Content $env:GITHUB_STEP_SUMMARY ('| {0} | {1} | {2} | {3} |' -f $repoName, $bbsProj, $ghOrg, $logFile)\n\
        \  }\n\n  Add-Content $env:GITHUB_STEP_SUMMARY ''\n}\n\n# Success table (first 10)\nif ($success -gt 0) {\n  Add-Content $env:GITHUB_STEP_SUMMARY\
        \ '## \u2705 Successfully Migrated Repositories'\n  Add-Content $env:GITHUB_STEP_SUMMARY ('Total: **{0}** repositories migrated successfully'\
        \ -f $success)\n  Add-Content $env:GITHUB_STEP_SUMMARY ''\n  Add-Content $env:GITHUB_STEP_SUMMARY '| Repository | GitHub URL |'\n  Add-Content\
        \ $env:GITHUB_STEP_SUMMARY '|------------|------------|'\n\n  ($results | Where-Object { $_.Migration_Status -eq 'Success' } | Select-Object\
        \ -First 10) | ForEach-Object {\n    $repoName = if ($_.repo) { $_.repo } else { $_.github_repo }\n    $ghUrl = 'https://github.com/{0}/{1}'\
        \ -f $_.github_org, $_.github_repo\n    Add-Content $env:GITHUB_STEP_SUMMARY ('| {0} | {1} |' -f $repoName, $ghUrl)\n  }\n\n  $more =\
        \ $success - 10\n  if ($more -gt 0) {\n    Add-Content $env:GITHUB_STEP_SUMMARY ''\n    Add-Content $env:GITHUB_STEP_SUMMARY ('_... and\
        \ **{0}** more_' -f $more)\n  }\n}\n"
    - name: Upload Migration Logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: migration-logs-${{ github.run_id }}
        path: migration-*.txt
        retention-days: 90
        if-no-files-found: warn
    - name: Upload Verbose Logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: verbose-logs
        path: |
          *.log
          **/*.log
          logs/**/*.log
        retention-days: 90
        if-no-files-found: warn
    - name: Upload Output CSV
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: migration-output-csv-${{ github.run_id }}
        path: repo_migration_output-*.csv
        retention-days: 90
        if-no-files-found: error
  validate-migrations:
    name: "Validate Migrated Repositories (BBS \u2192 GH)"
    runs-on: windows-latest
    timeout-minutes: 120
    environment: PAT tokens
    needs:
    - migrate-repositories
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
    - name: Divert job summary (table-only later)
      shell: pwsh
      run: |
        echo "REAL_SUMMARY=$env:GITHUB_STEP_SUMMARY" >> $env:GITHUB_ENV
        $discard = Join-Path $env:RUNNER_TEMP "_discarded_summary.md"
        echo "GITHUB_STEP_SUMMARY=$discard" >> $env:GITHUB_ENV
    - name: Setup GitHub CLI
      shell: pwsh
      run: |
        gh --version
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
    - name: Resolve inputs to env
      shell: pwsh
      run: |
        echo "CSV_FILE=${{ inputs.csv_path }}" >> $env:GITHUB_ENV
        echo "BBS_BASE_URL=${{ inputs.bbs_base_url }}" >> $env:GITHUB_ENV
        if (${{ inputs.gh_host }}) { echo "GH_HOST=${{ inputs.gh_host }}" >> $env:GITHUB_ENV }
    - name: Validate Inputs
      shell: pwsh
      run: |
        if (-not $env:CSV_FILE) { throw "csv_path is required" }
        if (-not $env:BBS_BASE_URL) { throw "bbs_base_url is required" }
        Write-Host "CSV_FILE=$env:CSV_FILE"
        Write-Host "BBS_BASE_URL=$env:BBS_BASE_URL"
        if ($env:GH_HOST) { Write-Host "GH_HOST=$env:GH_HOST" }
    - name: Validate CSV File & Columns
      shell: pwsh
      run: "$csvPath = $env:CSV_FILE\nif (-not (Test-Path $csvPath)) {\n  Write-Error \"CSV file not found: $csvPath\"; exit 1\n}\n$csv = Import-Csv\
        \ -Path $csvPath\nif (-not $csv -or $csv.Count -eq 0) {\n  Write-Error \"CSV appears empty: $csvPath\"; exit 1\n}\n$required = @('project-key','repo','url','github_org','github_repo')\n\
        $cols = $csv[0].PSObject.Properties.Name\n$missing = $required | Where-Object { $_ -notin $cols }\nif ($missing.Count -gt 0) {\n  Write-Error\
        \ (\"Missing required columns in CSV: {0}\" -f ($missing -join ', ')); exit 1\n}\nWrite-Host \"\u2705 CSV structure validation passed\"\
        \nWrite-Host \"Total repositories to validate: $($csv.Count)\"\n"
    - name: Run Migration Validation (BBS to GH)
      shell: pwsh
      env:
        GH_PAT: ${{ secrets.GH_PAT }}
        GH_TOKEN: ${{ secrets.GH_PAT }}
        GH_HOST: ${{ env.GH_HOST }}
        BBS_TOKEN: ${{ secrets.BBS_TOKEN }}
        BBS_AUTH_TYPE: ${{ secrets.BBS_AUTH_TYPE }}
        BBS_USERNAME: ${{ secrets.BBS_USERNAME }}
        BBS_PASSWORD: ${{ secrets.BBS_PASSWORD }}
      run: |
        .\scripts\2_migration_validation_bbs.ps1 -CsvPath "$env:CSV_FILE" -BbsBaseUrl "$env:BBS_BASE_URL"
    - name: Upload Validation Results (Logs + CSV + MD)
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: validation-results-bbs-${{ github.run_number }}
        path: |
          validation-*.txt
          validation-*.json
          validation-summary.csv
          validation-summary.md
        overwrite: true
        retention-days: 30
    - name: Restore real summary & clear
      if: always()
      shell: pwsh
      run: |
        if (-not $env:REAL_SUMMARY) { throw "REAL_SUMMARY not set." }
        $env:GITHUB_STEP_SUMMARY = $env:REAL_SUMMARY
        [System.IO.File]::WriteAllText($env:GITHUB_STEP_SUMMARY, [string]::Empty)
    - name: Append Table Summary (ONLY)
      if: always()
      shell: pwsh
      run: |
        if (Test-Path "validation-summary.md") {
          $content = Get-Content "validation-summary.md" -Raw
          $header = @(
            "## Repository Validation Summary",
            "",
            $content
          ) -join "`n"
          $header | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
        } else {
          Write-Host "validation-summary.md not found; skipping summary table."
        }
